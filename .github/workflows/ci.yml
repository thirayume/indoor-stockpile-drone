name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        # Datasets are not needed for tests; skip submodules to stay fast.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install system libraries for Open3D
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgl1 libegl1 libgomp1
      - name: Install backend
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests ../tools
      - name: Test
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Type-check and build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image (without OpenSfM)
        run: docker build backend
      - name: Build web image
        run: docker build web
