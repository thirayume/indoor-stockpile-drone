services:
  backend:
    build:
      context: ./backend
      args:
        # Bake the OpenSfM CLI into the image (long C++ build):
        #   INSTALL_OPENSFM=true docker compose build backend
        INSTALL_OPENSFM: ${INSTALL_OPENSFM:-false}
    ports:
      # Host port configurable: set BACKEND_PORT in the shell or in a .env
      # file next to this compose file.
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Host data (ODMdata submodule + opensfm_project) mounted read-only.
      # OpenSfM writes its outputs into data/opensfm_project/ — drop ":ro"
      # when running reconstructions inside the container.
      - ./data:/app/data:ro
    environment:
      - STOCKPILE_DATA_DIR=/app/data
      - OPEN_SFM_DATA_ROOT=/app/data/opensfm_project
    healthcheck:
      # python one-liner because the slim image ships no curl/wget
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./web
      target: serve   # switch to "dev" for the hot-reload dev server
    ports:
      # Host port configurable: set WEB_PORT if 5173 is taken by another app.
      - "${WEB_PORT:-5173}:5173"
    environment:
      # The vite proxy forwards /api/* here (see web/vite.config.ts).
      - VITE_API_URL=http://backend:8000
    healthcheck:
      # busybox wget ships with alpine; 127.0.0.1 (not localhost) because
      # busybox resolves localhost to ::1 while vite binds IPv4 only
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5173/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
